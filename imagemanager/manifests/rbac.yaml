apiVersion: v1
kind: ServiceAccount
metadata:
  name: eda-imagemanager
  namespace: eda-system
---
# Dedicated ServiceAccount for the node-agent DaemonSet, intentionally with NO
# Role/ClusterRole binding: the node-agent makes zero Kubernetes API calls (it
# learns the Service ClusterIP from in-cluster DNS), so it must NOT carry the
# controller SA's cluster-wide Artifact/ConfigMap write + Keycloak-secret-read
# powers onto every node. Token auto-mount is also disabled here and on the pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eda-imagemanager-node-agent
  namespace: eda-system
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eda-imagemanager
rules:
  # Create/manage Artifact CRs (the integration point) in any namespace.
  - apiGroups: ["artifacts.eda.nokia.com"]
    resources: ["artifacts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read namespaces to populate the UI namespace picker (best-effort).
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  # ConfigMaps: the per-namespace trust-bundle (eda-asvr trusts our internal-CA
  # HTTPS pull endpoint) and per-image license ConfigMaps (license.key, in
  # eda-system, referenced by the generated NodeProfiles). delete: remove a
  # license ConfigMap when its image is deleted.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Manage this app's own cluster-scoped config + write its status.
  - apiGroups: ["imagemanager.eda.edacommunity.com"]
    resources: ["imagemanagerconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["imagemanager.eda.edacommunity.com"]
    resources: ["imagemanagerconfigs/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eda-imagemanager
subjects:
  - kind: ServiceAccount
    name: eda-imagemanager
    namespace: eda-system
roleRef:
  kind: ClusterRole
  name: eda-imagemanager
  apiGroup: rbac.authorization.k8s.io
---
# Read ONLY the two secrets needed for EDA single sign-on (scoped by name):
#   keycloak-admin-secret -> fetch the "eda" Keycloak client secret (OIDC code exchange)
#   eda-api-ca            -> trust the in-cluster eda-api/Keycloak TLS cert (gotcha 3)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eda-imagemanager-auth
  namespace: eda-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak-admin-secret", "eda-api-ca"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eda-imagemanager-auth
  namespace: eda-system
subjects:
  - kind: ServiceAccount
    name: eda-imagemanager
    namespace: eda-system
roleRef:
  kind: Role
  name: eda-imagemanager-auth
  apiGroup: rbac.authorization.k8s.io
