apiVersion: v1
kind: ServiceAccount
metadata:
  name: eda-imagemanager
  namespace: eda-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eda-imagemanager
rules:
  # Create/manage Artifact CRs (the integration point) in any namespace.
  - apiGroups: ["artifacts.eda.nokia.com"]
    resources: ["artifacts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read namespaces to populate the UI namespace picker (best-effort).
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  # Create the per-namespace trust-bundle ConfigMap that eda-asvr uses to trust
  # our internal-CA HTTPS file-serve endpoint when pulling artifacts.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Manage this app's own cluster-scoped config + write its status.
  - apiGroups: ["imagemanager.eda.edacommunity.com"]
    resources: ["imagemanagerconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["imagemanager.eda.edacommunity.com"]
    resources: ["imagemanagerconfigs/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eda-imagemanager
subjects:
  - kind: ServiceAccount
    name: eda-imagemanager
    namespace: eda-system
roleRef:
  kind: ClusterRole
  name: eda-imagemanager
  apiGroup: rbac.authorization.k8s.io
---
# Read ONLY the two secrets needed for EDA single sign-on (scoped by name):
#   keycloak-admin-secret -> fetch the "eda" Keycloak client secret (OIDC code exchange)
#   eda-api-ca            -> trust the in-cluster eda-api/Keycloak TLS cert (gotcha 3)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eda-imagemanager-auth
  namespace: eda-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak-admin-secret", "eda-api-ca"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eda-imagemanager-auth
  namespace: eda-system
subjects:
  - kind: ServiceAccount
    name: eda-imagemanager
    namespace: eda-system
roleRef:
  kind: Role
  name: eda-imagemanager-auth
  apiGroup: rbac.authorization.k8s.io
