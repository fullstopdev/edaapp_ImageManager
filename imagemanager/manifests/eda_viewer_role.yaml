apiVersion: core.eda.nokia.com/v1
kind: ClusterRole
metadata:
  labels:
    eda.nokia.com/app: eda-imagemanager
  name: imagemanager-viewer
spec:
  description: Read-only access to the Image Manager launcher and HttpProxy UI.
  resourceRules:
    - apiGroups:
        - imagemanager.eda.edacommunity.com/v1alpha1
      resources:
        - imagemanagerconfigs
        - imagemanagerartifacts
      permissions: read
    - apiGroups:
        - core.eda.nokia.com/v1
      resources:
        - httpproxies
      permissions: read
  tableRules:
    - path: .cluster.imagemanager.eda.edacommunity.com.v1alpha1.imagemanagerconfigs.**
      permissions: read
    - path: .cluster.imagemanager.eda.edacommunity.com.v1alpha1.imagemanagerartifacts.**
      permissions: read
  urlRules:
    - path: /core/httpproxy/v1/imagemanager
      permissions: read
    - path: /core/httpproxy/v1/imagemanager/**
      permissions: read
