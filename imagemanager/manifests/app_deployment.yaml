apiVersion: apps/v1
kind: Deployment
metadata:
  name: eda-imagemanager
  namespace: eda-system
  labels:
    eda.nokia.com/app: eda-imagemanager
    eda.nokia.com/app-group: control-plane
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      eda.nokia.com/app: eda-imagemanager
  template:
    metadata:
      name: imagemanager
      namespace: eda-system
      labels:
        eda.nokia.com/app: eda-imagemanager
        eda.nokia.com/app-group: control-plane
    spec:
      serviceAccountName: eda-imagemanager
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: imagemanager-controller
          image: ghcr.io/fullstopdev/edaapp_imagemanager/imagemanager-controller:v0.0.6
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ALLOWED_ROLES
              value: "imagemanager-viewer,system-administrator" # app-set: ${allowedRoles}
          ports:
            - name: serving
              containerPort: 8443
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: serving
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: serving
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 5
          volumeMounts:
            - name: upload-data
              mountPath: /data
            - name: serving-cert
              mountPath: /var/run/eda/tls/serving
              readOnly: true
          resources:
            limits:
              cpu: "500m" # app-set: ${controllerCpuLimit}
              memory: "512Mi" # app-set: ${controllerMemoryLimit}
            requests:
              cpu: "100m"
              memory: "256Mi"
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: imagemanager-data
        - name: serving-cert
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: eda-internal-issuer
              csi.cert-manager.io/dns-names: "eda-imagemanager.${POD_NAMESPACE}.svc,eda-imagemanager.${POD_NAMESPACE}.svc.cluster.local,eda-imagemanager"
              csi.cert-manager.io/key-algorithm: ECDSA
              csi.cert-manager.io/duration: 720h0m0s
              csi.cert-manager.io/renew-before: 240h0m0s
