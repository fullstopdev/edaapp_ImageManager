---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: imagemanagerartifacts.imagemanager.eda.edacommunity.com
spec:
  group: imagemanager.eda.edacommunity.com
  names:
    kind: ImageManagerArtifact
    listKind: ImageManagerArtifactList
    plural: imagemanagerartifacts
    singular: imagemanagerartifact
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.displayName
      name: Display
      type: string
    - jsonPath: .status.namespace
      name: Namespace
      type: string
    - jsonPath: .status.sizeBytes
      name: Size
      type: integer
    - jsonPath: .status.downloadStatus
      name: Status
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ImageManagerArtifact is a flat launcher row for one tracked upload/image.
          Cluster-scoped; metadata.name is stable per upload (see controller).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ImageManagerArtifactSpec is intentionally empty. The controller is the sole
              writer and only updates status; spec exists so EDA CE backward-compatibility
              checks do not nil-deref on a missing spec schema during manifest upgrades.
            type: object
          status:
            description: |-
              ImageManagerArtifactStatus is a launcher-dashlet row for one tracked image.
              The controller is the sole writer; rows mirror PVC uploads and managed
              Artifact CRs so the EDA nav table can query a flat CR list (EQL cannot
              navigate into ImageManagerConfig.status.artifacts arrays).
            properties:
              artifactName:
                description: ArtifactName is the primary Artifact CR name for this
                  row.
                type: string
              displayName:
                description: DisplayName is the human-friendly image name shown in
                  the launcher UI.
                type: string
              downloadStatus:
                description: DownloadStatus mirrors Artifact.status.downloadStatus
                  (or aggregated).
                type: string
              filePath:
                description: FilePath is the artifact-server destination path.
                type: string
              namespace:
                description: Namespace is the Artifact CR namespace.
                type: string
              open:
                description: Open is the launcher "View" link label (navigation uses
                  dashlet target).
                type: string
              repo:
                description: Repo is the artifact repo.
                type: string
              sizeBytes:
                description: SizeBytes is the on-disk size when known.
                format: int64
                type: integer
              statusReason:
                description: StatusReason is a short error/detail string when applicable.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
